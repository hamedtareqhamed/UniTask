name: Release Builder

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - name: Create .env
        run: |
          cat <<ENV_EOF > .env
          FLUTTER_FIREBASE_API_KEY_ANDROID=${{ secrets.FLUTTER_FIREBASE_API_KEY_ANDROID }}
          FLUTTER_FIREBASE_APP_ID_ANDROID=${{ secrets.FLUTTER_FIREBASE_APP_ID_ANDROID }}
          FLUTTER_FIREBASE_API_KEY_IOS=${{ secrets.FLUTTER_FIREBASE_API_KEY_IOS }}
          FLUTTER_FIREBASE_APP_ID_IOS=${{ secrets.FLUTTER_FIREBASE_APP_ID_IOS }}
          FLUTTER_FIREBASE_API_KEY_WEB=${{ secrets.FLUTTER_FIREBASE_API_KEY_WEB }}
          FLUTTER_FIREBASE_APP_ID_WEB=${{ secrets.FLUTTER_FIREBASE_APP_ID_WEB }}
          FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
          ANDROID_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_FILE=${{ secrets.ANDROID_STORE_FILE }}
          ANDROID_STORE_PASSWORD=${{ secrets.ANDROID_STORE_PASSWORD }}
          IOS_CERTIFICATE_BASE64=${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD=${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64=${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_KEYCHAIN_PASSWORD=${{ secrets.IOS_KEYCHAIN_PASSWORD }}
          ENV_EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release --dart-define-from-file=.env
        
      - name: Zip Web Build
        run: |
          cd build/web
          zip -r ../../web-release.zip .
          cd ../../

      - name: Build Android APK
        run: flutter build apk --release --dart-define-from-file=.env

      - name: Build Android Bundle
        run: flutter build appbundle --release --dart-define-from-file=.env

      - name: Build iOS
        run: |
          set -a
          source .env
          set +a

          if [ -z "$IOS_CERTIFICATE_BASE64" ] || [ ${#IOS_CERTIFICATE_BASE64} -lt 10 ]; then
            echo "No valid iOS Certificate provided. Building without codesign..."
            flutter build ios --release --no-codesign --dart-define-from-file=.env
            cd build/ios/iphoneos
            zip -r ../../../ios-app-unsigned.zip Runner.app
            cd ../../../
          else
            CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
            PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
            KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

            echo -n "$IOS_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
            echo -n "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH

            security create-keychain -p "$IOS_KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
            security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
            security unlock-keychain -p "$IOS_KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

            security import $CERTIFICATE_PATH -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH || true
            security list-keychain -d user -s $KEYCHAIN_PATH

            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles
            
            flutter build ipa --release --dart-define-from-file=.env || true
            if [ -d "build/ios/ipa" ]; then
              cp build/ios/ipa/*.ipa ios-app-signed.ipa || true
            fi
          fi

      - name: Release Files
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
            web-release.zip
            ios-app-unsigned.zip
            ios-app-signed.ipa
